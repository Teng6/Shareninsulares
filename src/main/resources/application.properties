spring.application.name=shareninsulares

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shareninsulares}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:toliveanddie09@}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:shareninsulares-super-secret-key-must-be-at-least-32-chars-long}
jwt.expiration=86400000

firebase.config.path=firebase-service-account.json

server.port=${PORT:8080}